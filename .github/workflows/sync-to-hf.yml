name: Sync to Hugging Face Space

# Pushes this repo's contents to the Hugging Face Space on every commit to main.
# Requires one GitHub secret: HF_TOKEN (a write-scoped token with access to the
# build-small-hackathon org). Add it with: gh secret set HF_TOKEN

on:
  push:
    branches: [main]
  workflow_dispatch: # lets you trigger a sync manually from the Actions tab

concurrency:
  group: sync-hf
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - run: pip install --upgrade "huggingface_hub>=0.27"

      - name: Upload to the Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python - <<'PY'
          import os
          from huggingface_hub import HfApi

          REPO = "build-small-hackathon/wpl-discovery"
          api = HfApi(token=os.environ["HF_TOKEN"])

          # Create the Space if it doesn't exist yet (no-op if it does).
          api.create_repo(repo_id=REPO, repo_type="space",
                          space_sdk="gradio", exist_ok=True)

          api.upload_folder(
              repo_id=REPO,
              repo_type="space",
              folder_path=".",
              commit_message="Sync from GitHub",
              ignore_patterns=[".git*", ".github*", "**/__pycache__/**",
                               "*.pyc", "traces.jsonl", ".DS_Store"],
              # Mirror: remove stale Python/cache left on the Space that aren't
              # in this repo anymore (e.g. old v1 files). Keeps docs/json/html.
              delete_patterns=["*.py", "*.pyc", "__pycache__/**",
                               "**/__pycache__/**"],
          )
          print("Synced to", REPO)

          # Uploading alone doesn't guarantee a fresh boot: a Space that is
          # paused or stuck in a build/runtime error keeps serving the old
          # container. Log the stage for diagnosis, then force a full
          # rebuild so the new code actually goes live.
          runtime = api.get_space_runtime(REPO)
          print("Space stage before restart:", runtime.stage)
          api.restart_space(REPO, factory_reboot=True)
          print("Requested factory reboot of", REPO)
          PY
